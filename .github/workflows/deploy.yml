name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/Authentication-1.0-SNAPSHOT.jar"
          target: "/home/ec2-user/"
          strip_components: 1

      - name: Update systemd and restart Spring Boot
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DATABASE_URL,DATABASE_USERNAME,DATABASE_PASSWORD,MAIL_USERNAME,MAIL_PASSWORD,APP_EMAIL_FROM,CORS_ORIGINS
          script: |
            sudo tee /etc/systemd/system/springboot.service > /dev/null << EOF
            [Unit]
            Description=Spring Boot Application
            After=network.target

            [Service]
            User=ec2-user
            Environment="DATABASE_URL=$DATABASE_URL"
            Environment="DATABASE_USERNAME=$DATABASE_USERNAME"
            Environment="DATABASE_PASSWORD=$DATABASE_PASSWORD"
            Environment="MAIL_HOST=smtp-relay.brevo.com"
            Environment="MAIL_PORT=587"
            Environment="MAIL_USERNAME=$MAIL_USERNAME"
            Environment="MAIL_PASSWORD=$MAIL_PASSWORD"
            Environment="APP_EMAIL_FROM=$APP_EMAIL_FROM"
            Environment="CORS_ORIGINS=$CORS_ORIGINS"
            ExecStart=/usr/bin/java -jar /home/ec2-user/Authentication-1.0-SNAPSHOT.jar --spring.profiles.active=prod
            SuccessExitStatus=143
            Restart=always
            RestartSec=10
            StandardOutput=append:/home/ec2-user/app.log
            StandardError=append:/home/ec2-user/app.log

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl restart springboot
            sleep 5
            sudo systemctl is-active springboot && echo "✅ App is running" || echo "❌ App failed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          APP_EMAIL_FROM: ${{ secrets.APP_EMAIL_FROM }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}